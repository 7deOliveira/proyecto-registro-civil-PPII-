<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Administrativo – Registro Civil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rc-red:      #c8102e;
      --rc-red-dark: #a00d24;
      --rc-dark:     #1a2332;
      --font-d:      'Barlow Condensed', sans-serif;
      --font-b:      'Barlow', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: var(--font-b);
      background: linear-gradient(135deg, #1a2332 0%, #243044 60%, #1e2d40 100%);
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Partículas decorativas */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(200,16,46,.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,16,46,.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%; max-width: 420px; padding: 20px;
      animation: loginIn .45s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes loginIn {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .login-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      overflow: hidden;
    }

    /* Header rojo */
    .login-header {
      background: var(--rc-red);
      padding: 32px 36px 28px;
      text-align: center;
      position: relative;
    }
    .login-logo {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      border: 3px solid rgba(255,255,255,.35);
      font-family: var(--font-d); font-size: 22px; font-weight: 700;
      color: #fff; letter-spacing: 1px;
    }
    .login-header h1 {
      font-family: var(--font-d); font-size: 22px; font-weight: 800;
      color: #fff; text-transform: uppercase; letter-spacing: 2px;
      margin: 0 0 4px;
    }
    .login-header p { color: rgba(255,255,255,.75); font-size: 13px; margin: 0; }

    /* Badge de sección */
    .login-section-badge {
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.9);
      font-size: 10.5px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; padding: 4px 12px;
      border-radius: 20px; display: inline-block; margin-bottom: 14px;
    }

    /* Cuerpo formulario */
    .login-body { padding: 32px 36px 36px; }

    .form-label {
      font-size: 13px; font-weight: 700; color: #2d3748; margin-bottom: 6px;
    }
    .form-control-login {
      width: 100%;
      border: 1.5px solid #e5e7eb; border-radius: 7px;
      padding: 11px 14px 11px 42px;
      font-size: 14.5px; font-family: var(--font-b); color: #2d3748;
      outline: none; transition: border-color .2s, box-shadow .2s;
      background: #fff;
    }
    .form-control-login:focus {
      border-color: var(--rc-red);
      box-shadow: 0 0 0 3px rgba(200,16,46,.12);
    }
    .input-wrap { position: relative; margin-bottom: 18px; }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: #aaa; pointer-events: none;
    }
    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px;
      padding: 0; transition: color .2s;
    }
    .toggle-pass:hover { color: var(--rc-red); }

    /* Error */
    .login-error {
      background: rgba(200,16,46,.07);
      border: 1px solid rgba(200,16,46,.25);
      border-radius: 7px; padding: 10px 14px;
      font-size: 13px; color: var(--rc-red);
      margin-bottom: 18px; display: none;
      display: flex; align-items: center; gap: 8px;
    }
    .login-error.hidden { display: none !important; }

    /* Botón */
    .btn-login {
      width: 100%; background: var(--rc-red); color: #fff;
      border: none; border-radius: 7px; padding: 13px;
      font-size: 15px; font-weight: 700; font-family: var(--font-b);
      cursor: pointer; transition: all .22s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: .3px;
    }
    .btn-login:hover {
      background: var(--rc-red-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,16,46,.35);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* Link volver */
    .login-back {
      text-align: center; margin-top: 20px;
    }
    .login-back a {
      color: rgba(255,255,255,.55); font-size: 13px;
      text-decoration: none; transition: color .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .login-back a:hover { color: rgba(255,255,255,.9); }

    /* Spinner carga */
    .spinner-login {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .login-header { padding: 24px 24px 22px; }
      .login-body   { padding: 24px 24px 28px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <span class="login-section-badge"><i class="bi bi-shield-lock-fill"></i> &nbsp;Área restringida</span>
      <div class="login-logo">RC</div>
      <h1>Registro Civil</h1>
      <p>Santiago del Estero &nbsp;·&nbsp; Panel Administrativo</p>
    </div>

    <!-- Formulario -->
    <div class="login-body">

      <div id="login-error" class="login-error hidden">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="login-error-msg">Credenciales incorrectas.</span>
      </div>

      <form method="POST" action="{% url 'login' %}" id="login-form" autocomplete="off"  novalidate>
        {% csrf_token %}
        {% if error %}
        <div class="login-error">
              <i class="bi bi-exclamation-circle-fill"></i>
              <span>{{ error }}</span>
        </div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label" for="login-email">
            <i class="bi bi-envelope-fill" style="color:var(--rc-red);margin-right:5px;"></i>
            Usuario
          </label>
          <div class="input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input type="text" name="username" class="form-control-login"
              placeholder="Usuario" autocomplete="username" required/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="login-pass">
            <i class="bi bi-lock-fill" style="color:var(--rc-red);margin-right:5px;"></i>
            Contraseña
          </label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" name="password" class="form-control-login"
              placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="toggle-pass" id="toggle-pass" aria-label="Mostrar contraseña">
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <span id="btn-login-text">Ingresar al sistema</span>
          <div class="spinner-login" id="login-spinner"></div>
          <i class="bi bi-arrow-right-circle-fill" id="btn-login-icon"></i>
        </button>
      </form>
    </div>

  </div>

  <div class="login-back">
    <a href="index.html">
      <i class="bi bi-arrow-left"></i> Volver al sitio público
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>
<script>
  // Toggle ver/ocultar contraseña
  document.getElementById('toggle-pass')?.addEventListener('click', function() {
    const inp  = document.getElementById('login-pass');
    const icon = document.getElementById('eye-icon');
    const show = inp.type === 'password';
    inp.type   = show ? 'text' : 'password';
    icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  // Mostrar/ocultar error con animación
  document.getElementById('login-form')?.addEventListener('submit', function() {
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');
  });

  // Override del manejo de error para mostrar animación
  const origErr = document.getElementById('login-error');
  const observer = new MutationObserver(() => {
    if (!origErr.classList.contains('hidden')) {
      origErr.style.animation = 'none';
      void origErr.offsetHeight;
      origErr.style.animation = 'loginIn .3s ease both';
    }
  });
  observer.observe(origErr, { attributes: true, attributeFilter: ['class'] });

  // Spinner al submit (breve)
  document.getElementById('login-form')?.addEventListener('submit', () => {
    const btn     = document.getElementById('btn-login');
    const spinner = document.getElementById('login-spinner');
    const icon    = document.getElementById('btn-login-icon');
    btn.disabled  = true;
    spinner.style.display = 'block';
    icon.style.display    = 'none';
    setTimeout(() => {
      btn.disabled  = false;
      spinner.style.display = 'none';
      icon.style.display    = '';
    }, 600);
  });
</script>
</body>
</html>
